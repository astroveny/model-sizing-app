services:
  ml-sizer:
    build: .
    container_name: ml-sizer
    ports:
      - "3300:3300"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3300 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
